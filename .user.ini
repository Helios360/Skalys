; ============================================================
;  Skalys — Configuration PHP (OVH hébergement mutualisé)
; ============================================================

; ===== Sécurité =====
display_errors      = Off
display_startup_errors = Off
expose_php          = Off
log_errors          = On

; ===== Performances =====
max_execution_time  = 30
memory_limit        = 128M
realpath_cache_size = 512k
realpath_cache_ttl  = 600

; ===== Encodage =====
default_charset     = "UTF-8"
mbstring.internal_encoding = UTF-8

; ===== Upload (formulaire candidature) =====
post_max_size       = 10M
upload_max_filesize = 8M
max_input_time      = 30
